    <script>
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const icon = document.getElementById('hamburger');
            menu.classList.toggle('active');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        }

        // Smooth Page Transition on Load
        window.onload = () => {
            document.querySelectorAll('.page-transition').forEach(el => {
                el.style.animation = 'fadeIn 0.6s ease forwards';
            });
            console.log('%c📰 News Page Loaded with Smooth Transitions', 'color:#22d3ee');
        };
    </script>
	
    <script>
        // === NewsAPI Integration (Replace with your key) ===
        const NEWSAPI_KEY = "YOUR_NEWSAPI_KEY"; // Get free key at newsapi.org

        async function fetchNews() {
            try {
                const res = await fetch(`https://newsapi.org/v2/everything?q=soccer OR football OR "world cup" OR premier league&apiKey=${NEWSAPI_KEY}&pageSize=12`);
                const data = await res.json();
                return data.articles || [];
            } catch (e) {
                console.log("NewsAPI unavailable, using demo data");
                return demoNews;
            }
        }

        const demoNews = [
            {
                title: "Mbappé Completes Record Transfer to Real Madrid",
                description: "The French superstar has officially joined Los Blancos in a €200M deal.",
                urlToImage: "https://picsum.photos/id/1015/800/500",
                publishedAt: "2025-06-04",
                source: { name: "ESPN" }
            },
            {
                title: "FIFA Confirms 48-Team Format for 2026 World Cup",
                description: "Expanded tournament structure officially approved.",
                urlToImage: "https://picsum.photos/id/201/800/500",
                publishedAt: "2025-06-03",
                source: { name: "FIFA" }
            }
        ];

        let allNews = [];

        async function loadNews() {
            allNews = await fetchNews();
            renderNews(allNews);
            renderBreakingNews(allNews[0]);
        }

        function renderBreakingNews(article) {
            if (!article) return;
            document.getElementById('breakingNews').style.backgroundImage = `url('${article.urlToImage || "https://picsum.photos/id/1015/1200/600"}')`;
            document.getElementById('breakingTitle').textContent = article.title;
        }

        function renderNews(newsList) {
            const container = document.getElementById('newsGrid');
            container.innerHTML = '';
            newsList.forEach((news, i) => {
                const card = document.createElement('div');
                card.className = "news-card glass rounded-3xl overflow-hidden cursor-pointer";
                card.innerHTML = `
                    <img src="${news.urlToImage || 'https://picsum.photos/600/400'}" class="w-full h-52 object-cover">
                    <div class="p-6">
                        <div class="text-xs text-blue-400 mb-3">${news.source.name} • ${new Date(news.publishedAt).toLocaleDateString()}</div>
                        <h3 class="font-bold text-xl leading-tight mb-3 line-clamp-2">${news.title}</h3>
                        <p class="text-gray-400 text-sm line-clamp-3">${news.description}</p>
                    </div>
                `;
                card.onclick = () => openArticle(news);
                container.appendChild(card);
            });
        }

        function openArticle(article) {
            document.getElementById('modalImage').src = article.urlToImage || 'https://picsum.photos/800/500';
            document.getElementById('modalTitle').textContent = article.title;
            document.getElementById('modalMeta').innerHTML = `
                <span>${article.source.name}</span>
                <span>${new Date(article.publishedAt).toLocaleDateString()}</span>
            `;
            document.getElementById('modalContent').innerHTML = `<p class="text-lg">${article.description || article.content || "Full story available on original source."}</p>`;
            document.getElementById('articleModal').classList.remove('hidden');
        }

        function closeArticleModal() {
            document.getElementById('articleModal').classList.add('hidden');
        }

        function filterCategory(cat) {
            document.querySelectorAll('.active-cat').forEach(el => el.classList.remove('active-cat', 'bg-blue-600'));
            if (cat === 'all') {
                renderNews(allNews);
            } else {
                const filtered = allNews.filter(n => n.title.toLowerCase().includes(cat));
                renderNews(filtered.length ? filtered : allNews);
            }
        }

        // Live Score Ticker
        function startLiveTicker() {
            const ticker = document.getElementById('liveTicker');
            const scores = [
                "🇲🇽 Mexico 2-1 South Africa • 72'",
                "🇰🇷 South Korea 1-0 Czechia • LIVE",
                "🇨🇦 Canada 1-1 Bosnia • 45'"
            ];
            let i = 0;
            setInterval(() => {
                ticker.innerHTML = `<span class="inline-block px-8">${scores[i % scores.length]}</span>`;
                i++;
            }, 4000);
        }

        function showAuthModal() {
            alert("Sign in for personalized news & push notifications");
        }

        function navigateTo(page) {
            alert(`Navigating to ${page}...`);
        }

        window.onload = () => {
            loadNews();
            startLiveTicker();
            console.log('%c📰 AdSLiveTv News Page - NewsAPI + Live Ticker Ready', 'color:#22d3ee;font-size:16px');
        };
    </script>
