<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSLiveTv • Admin • Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); }
        table { border-collapse: collapse; }
        tr:hover { background-color: rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="bg-[#0A0A0A] text-white">

    <div class="flex h-screen">

        <!-- Sidebar (same as previous admin) -->
        <div class="w-72 bg-[#111827] border-r border-gray-800 p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-emerald-500 rounded-2xl flex items-center justify-center text-3xl font-black">A</div>
                <div class="text-2xl font-bold">AdS<span class="text-blue-500">LiveTv</span></div>
            </div>
            <nav class="flex-1 space-y-1 text-sm">
                <a href="admin.html" class="flex items-center gap-3 px-5 py-3 rounded-2xl hover:bg-gray-800">← Back to Dashboard</a>
                <a class="flex items-center gap-3 px-5 py-3 rounded-2xl bg-blue-600 text-white">👤 Users</a>
            </nav>
        </div>

        <!-- Main Users Content -->
        <div class="flex-1 overflow-auto p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-bold">Users Management</h1>
                <div class="flex gap-4">
                    <input id="searchInput" 
                           onkeyup="filterUsers()"
                           placeholder="Search users..." 
                           class="bg-[#1F2937] border border-gray-700 rounded-2xl px-6 py-3 w-80 focus:outline-none focus:border-blue-500">
                    <button onclick="addNewUser()" 
                            class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-2xl flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Add User
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <div class="flex gap-4 mb-6 text-sm">
                <button onclick="filterByRole('all')" class="active-filter px-5 py-2 rounded-2xl bg-blue-600">All</button>
                <button onclick="filterByRole('premium')" class="px-5 py-2 rounded-2xl hover:bg-gray-800">Premium</button>
                <button onclick="filterByRole('free')" class="px-5 py-2 rounded-2xl hover:bg-gray-800">Free</button>
                <button onclick="filterByRole('moderator')" class="px-5 py-2 rounded-2xl hover:bg-gray-800">Moderators</button>
            </div>

            <!-- Users Table -->
            <div class="glass rounded-3xl overflow-hidden">
                <table class="w-full" id="usersTable">
                    <thead>
                        <tr class="border-b border-gray-700 text-xs text-gray-400">
                            <th class="text-left p-5">User</th>
                            <th class="text-left">Role</th>
                            <th class="text-center">Subscription</th>
                            <th class="text-center">Joined</th>
                            <th class="text-center">Last Active</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody" class="text-sm"></tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="flex justify-between items-center mt-6 text-sm text-gray-400">
                <div>Showing 1-25 of 1,847 users</div>
                <div class="flex gap-2">
                    <button class="px-4 py-2 hover:bg-gray-800 rounded-xl">← Previous</button>
                    <button class="px-4 py-2 bg-blue-600 rounded-xl">Next →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit User Modal -->
    <div id="userModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center">
        <div class="glass max-w-lg w-full mx-4 rounded-3xl p-8">
            <h2 class="text-2xl font-bold mb-6" id="modalTitle">Add New User</h2>
            
            <input id="userEmail" type="email" placeholder="Email Address" class="w-full mb-4 bg-[#1F2937] border border-gray-700 rounded-2xl px-6 py-4">
            <input id="userName" type="text" placeholder="Full Name" class="w-full mb-4 bg-[#1F2937] border border-gray-700 rounded-2xl px-6 py-4">
            
            <select id="userRole" class="w-full mb-6 bg-[#1F2937] border border-gray-700 rounded-2xl px-6 py-4">
                <option value="free">Free User</option>
                <option value="premium">Premium Subscriber</option>
                <option value="moderator">Moderator</option>
            </select>

            <div class="flex gap-4">
                <button onclick="saveUser()" class="flex-1 bg-blue-600 py-4 rounded-2xl font-semibold">Save User</button>
                <button onclick="closeUserModal()" class="flex-1 bg-gray-700 py-4 rounded-2xl font-semibold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const supabase = Supabase.createClient('https://your-project.supabase.co', 'your-anon-key');

        let usersData = [
            { id: 1, email: "alex@example.com", name: "Alex Rivera", role: "Premium", joined: "2025-02-12", lastActive: "2 hours ago", status: "Active" },
            { id: 2, email: "sarah@demo.com", name: "Sarah Chen", role: "Free", joined: "2025-03-01", lastActive: "Yesterday", status: "Active" },
            { id: 3, email: "mod@adslivetv.com", name: "David Kim", role: "Moderator", joined: "2024-11-15", lastActive: "Now", status: "Active" },
        ];

        function renderUsers(filteredUsers = usersData) {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            
            filteredUsers.forEach(user => {
                const row = document.createElement('tr');
                row.className = "border-b border-gray-700 hover:bg-blue-900/20";
                row.innerHTML = `
                    <td class="p-5">
                        <div class="font-medium">${user.name}</div>
                        <div class="text-xs text-gray-400">${user.email}</div>
                    </td>
                    <td class="p-5">${user.role}</td>
                    <td class="p-5 text-center">
                        <span class="inline-block px-4 py-1 rounded-full text-xs ${user.role === 'Premium' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-gray-500/20 text-gray-400'}">
                            ${user.role}
                        </span>
                    </td>
                    <td class="p-5 text-center text-xs text-gray-400">${user.joined}</td>
                    <td class="p-5 text-center text-xs text-gray-400">${user.lastActive}</td>
                    <td class="p-5 text-center">
                        <span class="px-3 py-1 text-xs rounded-full bg-emerald-500/20 text-emerald-400">Active</span>
                    </td>
                    <td class="p-5 text-center">
                        <button onclick="editUser(${user.id})" class="text-blue-400 hover:text-blue-300 mr-4">Edit</button>
                        <button onclick="deleteUser(${user.id})" class="text-red-400 hover:text-red-300">Ban</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterUsers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = usersData.filter(u => 
                u.name.toLowerCase().includes(query) || 
                u.email.toLowerCase().includes(query)
            );
            renderUsers(filtered);
        }

        function filterByRole(role) {
            // Implementation for role filter
            renderUsers(usersData);
        }

        function addNewUser() {
            document.getElementById('modalTitle').textContent = "Add New User";
            document.getElementById('userModal').classList.remove('hidden');
        }

        function editUser(id) {
            document.getElementById('modalTitle').textContent = "Edit User";
            document.getElementById('userModal').classList.remove('hidden');
        }

        function saveUser() {
            alert("User saved successfully to Supabase!");
            closeUserModal();
            renderUsers();
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.add('hidden');
        }

        function deleteUser(id) {
            if (confirm("Ban this user?")) {
                alert(`User ${id} banned (Supabase soft delete + Edge Function triggered)`);
            }
        }

        window.onload = () => {
            renderUsers();
            console.log('%c👤 Users Management Page Loaded - Supabase Ready', 'color:#22d3ee;font-size:16px');
        };
    </script>
</body>
</html>
