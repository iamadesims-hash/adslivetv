<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSLiveTv • Live Matches</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15"></script>
</head>
<body class="bg-[#0A0A0A] text-white">

    <nav class="fixed top-0 w-full bg-[#111827] border-b border-gray-800 z-50 px-6 py-4">
        <div class="max-w-screen-2xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-emerald-500 rounded-2xl flex items-center justify-center text-3xl font-black">A</div>
                <span class="text-3xl font-bold tracking-tighter">AdS<span class="text-[#2563EB]">LiveTv</span></span>
            </a>
            <a href="watch-live.html" class="text-blue-400 font-semibold">Live Matches</a>
        </div>
    </nav>

    <div class="pt-24 max-w-screen-2xl mx-auto px-6">
        <h1 class="text-4xl font-bold mb-8">🔴 Live Football Matches</h1>

        <div id="liveMatchesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const API_KEY = 'd3738d207amsh303e01afc7be370p1d16e5jsne2d646ff865e';

        async function fetchAllLiveMatches() {
            const container = document.getElementById('liveMatchesContainer');
            container.innerHTML = '<p class="col-span-full text-center py-12 text-gray-400">Loading live matches...</p>';

            try {
                // Get all matches
                const response = await fetch('https://football-live-stream-api.p.rapidapi.com/all-match', {
                    headers: {
                        'x-rapidapi-host': 'football-live-stream-api.p.rapidapi.com',
                        'x-rapidapi-key': d3738d207amsh303e01afc7be370p1d16e5jsne2d646ff865e
                    }
                });

                const data = await response.json();
                container.innerHTML = '';

                if (data && data.length > 0) {
                    data.forEach(match => {
                        const card = document.createElement('div');
                        card.className = "glass rounded-3xl p-6 hover:ring-2 hover:ring-blue-500 transition-all cursor-pointer";
                        card.innerHTML = `
                            <div class="flex justify-between items-center">
                                <div class="flex-1 text-right">
                                    <div class="font-medium">${match.home_team || 'Home'}</div>
                                </div>
                                <div class="px-6 text-center">
                                    <div class="text-2xl font-bold text-emerald-400">${match.score || 'VS'}</div>
                                </div>
                                <div class="flex-1">
                                    <div class="font-medium">${match.away_team || 'Away'}</div>
                                </div>
                            </div>
                            <div class="text-center text-xs text-gray-400 mt-4">${match.league || 'Live League'}</div>
                        `;
                        card.onclick = () => watchMatch(match);
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<p class="col-span-full text-center py-12 text-gray-400">No live matches at the moment.</p>`;
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = `<p class="col-span-full text-red-400 text-center py-12">Failed to load matches. Please check API key.</p>`;
            }
        }

        async function watchMatch(match) {
            // Try to get stream link
            try {
                const streamResponse = await fetch(`https://football-live-stream-api.p.rapidapi.com/link/${match.id || ''}`, {
                    headers: {
                        'x-rapidapi-host': 'football-live-stream-api.p.rapidapi.com',
                        'x-rapidapi-key': d3738d207amsh303e01afc7be370p1d16e5jsne2d646ff865e
                    }
                });
                const streamData = await streamResponse.json();
                
                alert(`Now watching: ${match.home_team} vs ${match.away_team}\n\nStream URL: ${streamData.stream_url || 'Coming soon'}`);
            } catch (e) {
                alert(`Now watching: ${match.home_team} vs ${match.away_team}`);
            }
        }

        // Auto refresh every 20 seconds
        window.onload = () => {
            fetchAllLiveMatches();
            setInterval(fetchAllLiveMatches, 20000);
        };
    </script>
</body>
</html>
