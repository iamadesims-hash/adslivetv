    <script>
       async function uploadImage() {
        const file = document.getElementById('imageUpload').files[0];
        if (!file) return;

        const { data, error } = await supabase.storage
            .from('images')
            .upload(`public/${Date.now()}-${file.name}`, file);

        if (error) {
            alert(error.message);
        } else {
            const publicUrl = supabase.storage.from('images').getPublicUrl(data.path);
            console.log('Image URL:', publicUrl.data.publicUrl);
            alert('Image uploaded successfully!');
        }
    }
    </script>

    async function loadProfile() {
            const { data: { session } } = await supabase.auth.getSession();

                return;
            }
            currentUser = session.user;

        async function loadBillingHistory() {
            const { data, error } = await supabase
                .from('payments')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            const container = document.getElementById('billingHistory');
            container.innerHTML = data && data.length > 0 ? data.map(p => `
                <div class="flex justify-between items-center glass rounded-2xl p-6">

                        <div class="font-medium">Premium Subscription</div>

        async function createCheckoutSession() {
            const { data, error } = await supabase.functions.invoke('create-checkout', {
                body: { priceId: 'price_1YourPriceId' }
            });
            if (error) alert(error.message);
            else stripe.redirectToCheckout({ sessionId: data.sessionId });
        }

        function generateInvoice() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("AdSLiveTv Invoice", 20, 30);
            doc.save("invoice.pdf");

    <script>
    // === SUPABASE CLIENT INITIALIZATION ===
    const supabaseUrl = 'https://hvmorwakzafqratahwbr.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bW9yd2FremFmcXJhdGFod2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTc0ODQsImV4cCI6MjA5NjI3MzQ4NH0.AuZGM4N4G2trCiOqvcn3Ht8u4BOommi7P7czi0fdo6o';

    const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey, {
        auth: {
            autoRefreshToken: true,
            persistSession: true,
            detectSessionInUrl: true
        }
    });

    // Global auth check (redirect if not logged in)
    async function requireAuth(redirectTo = 'auth.html') {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.href = redirectTo;
        }
        return session.user;
    }

    // Auto check on page load for protected pages
    window.addEventListener('load', async () => {
        if (window.location.pathname.includes('profile') || 
            window.location.pathname.includes('admin')) {
            await requireAuth();
        }
    });
    </script>
