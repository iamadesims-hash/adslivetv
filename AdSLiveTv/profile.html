<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSLiveTv • Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0A0A0A] text-white">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full bg-[#111827] border-b border-gray-800 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-emerald-500 rounded-2xl flex items-center justify-center text-3xl font-black">A</div>
                <span class="text-3xl font-bold tracking-tighter">AdS<span class="text-[#2563EB]">LiveTv</span></span>
            </a>
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="index.html">Home</a>
                <a href="worldcup.html">World Cup</a>
                <a href="leagues.html">Leagues</a>
                <a href="watch-live.html">Watch Live</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto pt-24 px-6">
        <h1 class="text-4xl font-bold mb-10">My Profile</h1>

        <!-- Profile Header -->
        <div class="glass rounded-3xl p-8 mb-10">
            <div class="flex flex-col md:flex-row gap-8 items-center md:items-start">
                <img id="userAvatar" src="https://via.placeholder.com/140" 
                     class="w-32 h-32 rounded-3xl object-cover border-4 border-blue-500">
                <div class="flex-1 text-center md:text-left">
                    <h2 id="displayName" class="text-3xl font-bold"></h2>
                    <p id="displayEmail" class="text-gray-400"></p>
                    <p id="userRole" class="text-emerald-400 text-sm mt-1"></p>
                    <p id="displayBio" class="mt-4 text-gray-300"></p>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <a href="profile-edit.html" class="glass rounded-3xl p-8 hover:bg-blue-600/10 transition-all text-center">
                ✏️ Edit Profile
            </a>
            <a href="profile-favorite-teams.html" class="glass rounded-3xl p-8 hover:bg-blue-600/10 transition-all text-center">
                ❤️ Favorite Teams
            </a>
            <a href="payments.html" class="glass rounded-3xl p-8 hover:bg-emerald-600/10 transition-all text-center">
                ⭐ Manage Subscription
            </a>
        </div>

        <button onclick="signOut()" 
                class="mt-10 w-full py-4 text-red-400 hover:bg-red-900/20 rounded-2xl">
            Sign Out
        </button>
    </div>

    <script>
        const supabase = Supabase.createClient(
            'https://hvmorwakzafqratahwbr.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bW9yd2FremFmcXJhdGFod2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTc0ODQsImV4cCI6MjA5NjI3MzQ4NH0.AuZGM4N4G2trCiOqvcn3Ht8u4BOommi7P7czi0fdo6o'
        );

        async function loadProfile() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = "auth.html";
                return;
            }

            const { data: profile } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();

            document.getElementById('displayName').textContent = profile?.full_name || session.user.email.split('@')[0];
            document.getElementById('displayEmail').textContent = session.user.email;
            document.getElementById('userRole').textContent = profile?.role === 'admin' ? 'Administrator' : 'Premium Member';
            document.getElementById('displayBio').textContent = profile?.bio || "No bio yet.";
            
            if (profile?.avatar_url) {
                document.getElementById('userAvatar').src = profile.avatar_url;
            }
        }

        async function signOut() {
            await supabase.auth.signOut();
            window.location.href = "auth.html";
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
