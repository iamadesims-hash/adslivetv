<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 • Group Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0A0A0A] text-white">
    <nav class="fixed top-0 w-full bg-[#111827] border-b border-gray-800 z-50 px-6 py-4">
        <div class="max-w-screen-2xl mx-auto flex justify-between">
            <a href="worldcup.html" class="font-bold text-2xl">World Cup 2026</a>
            <a href="worldcup.html" class="text-blue-400">← Back</a>
        </div>
    </nav>

    <div class="pt-24 max-w-6xl mx-auto px-6">
        <h1 class="text-4xl font-bold mb-10">Group Standings (Realtime)</h1>

        <!-- Group A -->
        <div class="glass rounded-3xl p-8 mb-12">
            <h2 class="font-bold text-2xl mb-6">Group A</h2>
            <div id="groupA" class="space-y-3"></div>
        </div>

        <!-- Other Groups & Leagues -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass rounded-3xl p-8">
                <h2 class="font-bold mb-6">Premier League</h2>
                <p class="text-gray-400">Coming Soon - Realtime Standings</p>
            </div>
            <div class="glass rounded-3xl p-8">
                <h2 class="font-bold mb-6">Champions League</h2>
                <p class="text-gray-400">Live Knockout Stage</p>
            </div>
        </div>
    </div>

    <script>
        const supabase = Supabase.createClient('https://hvmorwakzafqratahwbr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bW9yd2FremFmcXJhdGFod2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTc0ODQsImV4cCI6MjA5NjI3MzQ4NH0.AuZGM4N4G2trCiOqvcn3Ht8u4BOommi7P7czi0fdo6o');

        async function loadStandings() {
            const { data } = await supabase.from('standings').select('*').eq('group', 'A');
            document.getElementById('groupA').innerHTML = data.map(row => `
                <div class="flex justify-between items-center p-5 bg-[#1F2937] rounded-2xl">
                    <span class="font-medium">${row.team}</span>
                    <span class="font-bold">${row.points} pts</span>
                </div>
            `).join('');
        }

        // Realtime
        supabase.channel('standings-realtime')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'standings' }, loadStandings)
            .subscribe();

        window.onload = loadStandings;
    </script>
</body>
</html>
