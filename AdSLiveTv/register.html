<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSLiveTv • Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-[#0A0A0A] text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-emerald-500 rounded-3xl flex items-center justify-center text-4xl font-black">A</div>
                <span class="text-4xl font-bold tracking-tighter">AdS<span class="text-[#2563EB]">LiveTv</span></span>
            </a>
        </div>

        <div class="glass rounded-3xl p-10">
            <h1 class="text-3xl font-bold text-center mb-8">Create Your Account</h1>

            <!-- Google Sign Up -->
            <a href="#" onclick="signInWithGoogle()" 
               class="block w-full py-4 bg-white text-black rounded-2xl font-medium text-center mb-6">
                <i class="fa-brands fa-google"></i> Continue with Google
            </a>

            <div class="text-center text-gray-400 my-6">— or sign up with email —</div>

            <!-- Registration Form -->
            <input id="signupEmail" type="email" placeholder="Email address" 
                   class="w-full mb-4 bg-[#1F2937] border border-gray-700 rounded-2xl px-6 py-4">

            <input id="signupPassword" type="password" placeholder="Create a strong password" 
                   class="w-full mb-6 bg-[#1F2937] border border-gray-700 rounded-2xl px-6 py-4">

            <a href="register.html" onclick="emailSignUp()" 
               class="block w-full py-4 bg-blue-600 rounded-2xl font-semibold text-center mb-6">
                Create Account
            </a>

            <p class="text-center text-gray-400 text-sm">
                Already have an account? 
                <a href="auth.html" class="text-blue-400 hover:underline">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        const supabase = Supabase.createClient(
            'https://your-project.supabase.co', 
            'your-anon-key'
        );

        // Google Sign Up
        async function signInWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/profile.html' }
            });
            if (error) alert(error.message);
        }

        // Email Registration
        async function emailSignUp() {
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value.trim();

            if (!email || !password) {
                alert("Please fill in all fields");
                return;
            }

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    emailRedirectTo: window.location.origin + '/profile.html'
                }
            });

            if (error) {
                alert(error.message);
            } else {
                alert("Account created successfully! Please check your email to verify.");
                window.location.href = "auth.html";
            }
        }

        // Allow pressing Enter to submit
        document.getElementById('signupPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') emailSignUp();
        });
    </script>
</body>
</html>
