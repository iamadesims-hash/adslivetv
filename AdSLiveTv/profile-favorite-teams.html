<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSLiveTv • Favorite Teams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0A0A0A] text-white">

    <div class="max-w-4xl mx-auto pt-20 px-6">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-bold">Favorite Teams</h1>
            <a href="profile.html" class="text-blue-400 hover:underline">← Back to Profile</a>
        </div>

        <div class="glass rounded-3xl p-10">
            <h3 class="font-bold mb-8">Select Your Favorite Teams</h3>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="teamsGrid"></div>

            <button onclick="saveFavorites()" 
                    class="mt-12 w-full py-4 bg-blue-600 rounded-2xl font-semibold">
                Save My Favorites
            </button>
        </div>
    </div>

    <script>
        const supabase = Supabase.createClient('https://hvmorwakzafqratahwbr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bW9yd2FremFmcXJhdGFod2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTc0ODQsImV4cCI6MjA5NjI3MzQ4NH0.AuZGM4N4G2trCiOqvcn3Ht8u4BOommi7P7czi0fdo6o');

        const teams = [
            { name: "Nigeria", flag: "🇳🇬" },
            { name: "Argentina", flag: "🇦🇷" },
            { name: "Brazil", flag: "🇧🇷" },
            { name: "England", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
            { name: "France", flag: "🇫🇷" },
            { name: "Germany", flag: "🇩🇪" },
            { name: "Spain", flag: "🇪🇸" },
            { name: "Portugal", flag: "🇵🇹" }
        ];

        function renderTeams() {
            const container = document.getElementById('teamsGrid');
            container.innerHTML = teams.map(team => `
                <div onclick="toggleTeam(this)" 
                     class="glass rounded-3xl p-8 text-center cursor-pointer hover:bg-blue-600/20 transition-all team-card">
                    <div class="text-6xl mb-4">${team.flag}</div>
                    <div class="font-semibold">${team.name}</div>
                </div>
            `).join('');
        }

        function toggleTeam(el) {
            el.classList.toggle('bg-blue-600');
            el.classList.toggle('text-white');
        }

        async function saveFavorites() {
            const selected = Array.from(document.querySelectorAll('.team-card.bg-blue-600'))
                                .map(el => el.textContent.trim());
            
            const { error } = await supabase
                .from('profiles')
                .update({ favorite_teams: selected })
                .eq('id', (await supabase.auth.getSession()).data.session.user.id);

            if (error) alert(error.message);
            else alert("Favorite teams saved successfully!");
        }

        window.onload = renderTeams;
    </script>
</body>
</html>
